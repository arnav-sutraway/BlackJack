<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack Web Interface</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- The Dynamic CSS Table -->
        <div class="casino-table">
            <div class="table-felt">
                <div class="table-markings">
                    <h1>BLACKJACK</h1>
                    <h2>LEARN TO PLAY BLACKJACK!</h2>
                </div>
            </div>
        </div>

        <!-- Sidebar Panel -> Now Bottom Panel -->
        <aside class="control-panel glassmorphic">
            <!-- Primary Action Buttons -->
            <div class="action-buttons">
                <label class="camera-toggle glassmorphic">
                    <input type="checkbox" id="use-camera" />
                    <span>Use phone camera</span>
                </label>
                <button class="action-btn purple" id="btn-deal">DEAL</button>
                <button class="action-btn green" id="btn-hit" disabled>HIT</button>
                <button class="action-btn red" id="btn-stand" disabled>STAND</button>
                <button class="action-btn blue" id="btn-split" disabled>SPLIT</button>
                <button class="action-btn orange" id="btn-double" disabled>DOUBLE DOWN</button>
            </div>
        </aside>

        <!-- The Strategy Advisor Panel (Right Side) -->
        <aside class="ai-advisor-panel glassmorphic">
            <div class="chat-header">
                <h2>BLACKJACK ADVISOR</h2>
            </div>
            <div class="chat-content" id="chat-content-box">
                <div class="chat-message system-msg">
                    <div class="msg-bubble">Awaiting next hand...</div>
                </div>
            </div>
        </aside>

        <!-- Dynamic Gameplay Canvas Area -->
        <div class="play-area">
            <!-- Dealer Zone -->
            <div class="card-zone dealer-zone" id="dealer-hand"></div>
            
            <!-- Player Zone -->
            <div class="card-zone player-zone" id="player-hand"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
